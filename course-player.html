<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مشغل الكورس | PharmaPro Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #0A1628;
  --navy2:   #0F2040;
  --navy3:   #1E3A5F;
  --teal:    #00D4AA;
  --teal2:   #00B892;
  --gold:    #C9A84C;
  --gold2:   #E8C96A;
  --light:   #F0F4FF;
  --muted:   #8BA3C4;
  --white:   #FFFFFF;
  --card-bg: #0D1F38;
  --border:  rgba(0,212,170,0.15);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--navy);
  color: var(--light);
  overflow-x: hidden;
  direction: rtl;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,170,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
  height: 68px;
  background: rgba(10,22,40,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 36px; height: 36px;
  position: relative;
}

.logo-icon::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 12px; height: 14px;
  background: var(--teal);
  border-radius: 2px 2px 0 0;
}
.logo-icon::after {
  content: '';
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 22px solid var(--teal);
  opacity: 0.85;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}
.logo-text span:first-child {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--white);
  letter-spacing: -0.02em;
}
.logo-text span:last-child {
  font-size: 0.65rem;
  color: var(--teal);
  letter-spacing: 0.08em;
  font-weight: 600;
}

nav ul {
  display: flex;
  gap: 2rem;
  list-style: none;
}
nav ul a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 600;
  transition: color 0.2s;
}
nav ul a:hover { color: var(--teal); }

.nav-cta {
  background: var(--teal);
  color: var(--navy) !important;
  padding: 8px 20px;
  border-radius: 6px;
  font-weight: 700 !important;
  font-size: 0.85rem !important;
  transition: background 0.2s !important;
}
.nav-cta:hover { background: var(--teal2) !important; color: var(--navy) !important; }

section {
  position: relative;
  z-index: 1;
  padding: 90px 5%;
}

@media (max-width: 968px) {
  nav ul { display: none; }
}
  </style>
</head>
<body>
  <nav>
    <a href="pharma-landing.html" class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text">
        <span>PharmaPro Academy</span>
        <span>GMP · ISO · QC TRAINING</span>
      </div>
    </a>
    <ul>
      <li><a href="pharma-landing.html#courses">الكورسات</a></li>
      <li><a href="#" class="nav-cta">سجّل الآن</a></li>
    </ul>
  </nav>

  <section style="padding: 100px 5% 40px;">
    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; max-width: 1400px; margin: 0 auto;">
      
      <!-- Main Content Area -->
      <div>
        <!-- Video Player -->
        <div id="videoPlayerContainer"></div>
        
        <!-- Lecture Content -->
        <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-top: 2rem;">
          <h2 style="font-size: 1.3rem; font-weight: 700; color: var(--white); margin-bottom: 1rem;">محتوى المحاضرة</h2>
          <div id="lectureContent" style="color: var(--light); line-height: 1.8;">
            <p>سيتم عرض محتوى المحاضرة هنا...</p>
          </div>
        </div>
        
        <!-- Quiz Section -->
        <div id="quizContainer" style="margin-top: 2rem;"></div>
      </div>
      
      <!-- Sidebar -->
      <div>
        <!-- Course Info -->
        <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 2rem;">
          <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--white); margin-bottom: 1rem;">معلومات الكورس</h3>
          <div style="display: flex; flex-direction: column; gap: 1rem;">
            <div style="display: flex; align-items: center; gap: 10px;">
              <span style="color: var(--teal);">⏱</span>
              <span style="color: var(--light);">6 ساعات</span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
              <span style="color: var(--teal);">📁</span>
              <span style="color: var(--light);">5 وحدات</span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
              <span style="color: var(--teal);">⭐</span>
              <span style="color: var(--light);">4.6 تقييم</span>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
              <span style="color: var(--teal);">👥</span>
              <span style="color: var(--light);">156 مسجل</span>
            </div>
          </div>
        </div>
        
        <!-- Progress -->
        <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 2rem;">
          <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--white); margin-bottom: 1rem;">تقدمك</h3>
          <div style="margin-bottom: 1rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
              <span style="color: var(--light); font-size: 0.9rem;">إتمام الكورس</span>
              <span style="color: var(--teal); font-weight: 700;" id="progressPercent">0%</span>
            </div>
            <div style="height: 8px; background: rgba(0,212,170,0.2); border-radius: 4px; overflow: hidden;">
              <div id="progressBar" style="height: 100%; background: var(--teal); width: 0%; transition: width 0.3s;"></div>
            </div>
          </div>
          <div style="display: flex; gap: 1rem;">
            <div style="flex: 1; text-align: center; padding: 12px; background: rgba(0,212,170,0.1); border-radius: 8px;">
              <div style="font-size: 1.5rem; font-weight: 700; color: var(--teal);" id="completedLectures">0</div>
              <div style="font-size: 0.75rem; color: var(--muted);">مكتمل</div>
            </div>
            <div style="flex: 1; text-align: center; padding: 12px; background: rgba(201,168,76,0.1); border-radius: 8px;">
              <div style="font-size: 1.5rem; font-weight: 700; color: var(--gold);" id="quizScore">0</div>
              <div style="font-size: 0.75rem; color: var(--muted);">نقاط الاختبار</div>
            </div>
          </div>
        </div>
        
        <!-- Resources -->
        <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px;">
          <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--white); margin-bottom: 1rem;">الموارد</h3>
          <div style="display: flex; flex-direction: column; gap: 0.75rem;">
            <a href="#" style="display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(10,22,40,0.5); border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--light); transition: all 0.2s;">
              <span style="font-size: 1.2rem;">📄</span>
              <span style="font-size: 0.85rem;">دليل الكورس الكامل</span>
            </a>
            <a href="#" style="display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(10,22,40,0.5); border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--light); transition: all 0.2s;">
              <span style="font-size: 1.2rem;">📋</span>
              <span style="font-size: 0.85rem;">قوالب جاهزة</span>
            </a>
            <a href="#" style="display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(10,22,40,0.5); border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--light); transition: all 0.2s;">
              <span style="font-size: 1.2rem;">✏️</span>
              <span style="font-size: 0.85rem;">تمارين عملية</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Video Player Component (Embedded)
    class VideoPlayer {
      constructor(containerId, options = {}) {
        this.container = document.getElementById(containerId);
        this.options = {
          lectures: options.lectures || [],
          autoPlay: options.autoPlay || false,
          onLectureChange: options.onLectureChange || null,
          onProgress: options.onProgress || null
        };
        
        this.currentLecture = 0;
        this.isPlaying = false;
        this.currentTime = 0;
        this.duration = 0;
        this.progress = 0;
        
        this.init();
      }
      
      init() {
        this.render();
        this.attachEvents();
      }
      
      render() {
        const videoSource = this.options.lectures[0]?.videoUrl || '';
        const youtubeId = this.options.lectures[0]?.youtubeId || '';
        
        this.container.innerHTML = `
          <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden;">
            <div style="padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
              <div style="font-size: 1rem; font-weight: 700; color: var(--white);">${this.options.lectures[0]?.title || 'Video Player'}</div>
              <div style="background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3); color: var(--teal); padding: 4px 12px; border-radius: 100px; font-size: 0.72rem; font-weight: 600;">HD</div>
            </div>
            
            <div style="position: relative; background: #000; aspect-ratio: 16/9; max-height: 500px;">
              ${youtubeId ? `
                <iframe 
                  id="mainVideo" 
                  style="width: 100%; height: 100%; border: none;"
                  src="https://www.youtube.com/embed/${youtubeId}?rel=0&modestbranding=1"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowfullscreen>
                </iframe>
              ` : videoSource ? `
                <video id="mainVideo" style="width: 100%; height: 100%; object-fit: cover;" controls>
                  <source src="${videoSource}" type="video/mp4">
                  متصفحك لا يدعم تشغيل الفيديو
                </video>
              ` : `
                <div id="videoPlaceholder" style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--navy3), var(--navy)); cursor: pointer; transition: all 0.3;">
                  <div style="width: 80px; height: 80px; background: var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; box-shadow: 0 8px 30px rgba(0,212,170,0.4);"></div>
                  <div style="font-size: 1rem; color: var(--muted); font-weight: 600;">انقر للتشغيل</div>
                </div>
              `}
            </div>
            
            <div style="padding: 16px 24px; background: rgba(10,22,40,0.8); border-top: 1px solid var(--border); display: flex; gap: 1rem; align-items: center;">
              <button id="playPauseBtn" style="background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3); color: var(--teal); width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 1rem;">▶</button>
              <button id="prevBtn" style="background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3); color: var(--teal); width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 1rem;">⏮</button>
              <button id="nextBtn" style="background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3); color: var(--teal); width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 1rem;">⏭</button>
              <div id="videoProgress" style="flex: 1; height: 6px; background: rgba(0,212,170,0.2); border-radius: 3px; cursor: pointer; position: relative;">
                <div id="progressBar" style="height: 100%; background: var(--teal); border-radius: 3px; width: 0%; transition: width 0.1s;"></div>
              </div>
              <div style="font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--muted); font-weight: 600;">
                <span id="currentTime">0:00</span> / <span id="totalTime">0:00</span>
              </div>
            </div>
            
            <div style="display: flex; border-bottom: 1px solid var(--border);">
              <div class="video-tab active" data-tab="lectures" style="padding: 14px 20px; font-size: 0.85rem; font-weight: 600; color: var(--teal); cursor: pointer; transition: all 0.2s; border-bottom: 2px solid var(--teal);">المحاضرات</div>
              <div class="video-tab" data-tab="notes" style="padding: 14px 20px; font-size: 0.85rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent;">ملاحظات</div>
              <div class="video-tab" data-tab="resources" style="padding: 14px 20px; font-size: 0.85rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent;">الموارد</div>
            </div>
            
            <div id="tab-lectures" class="video-tab-content" style="padding: 24px; display: block;">
              <div id="lectureList" style="display: flex; flex-direction: column; gap: 0.5rem;"></div>
            </div>
            
            <div id="tab-notes" class="video-tab-content" style="padding: 24px; display: none;">
              <textarea style="width: 100%; min-height: 200px; padding: 12px 16px; background: rgba(10,22,40,0.5); border: 2px solid var(--border); border-radius: 8px; color: var(--light); font-family: 'Cairo', sans-serif; font-size: 0.9rem;" placeholder="أضف ملاحظاتك هنا..."></textarea>
            </div>
            
            <div id="tab-resources" class="video-tab-content" style="padding: 24px; display: none;">
              <div id="resourceList" style="display: flex; flex-direction: column; gap: 0.5rem;"></div>
            </div>
          </div>
        `;
        
        this.renderLectureList();
        this.renderResourceList();
      }
      
      renderLectureList() {
        const lectureList = document.getElementById('lectureList');
        lectureList.innerHTML = this.options.lectures.map((lecture, index) => `
          <div class="lecture-item" data-index="${index}" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(10,22,40,0.5); border: 1px solid ${index === this.currentLecture ? 'var(--teal)' : 'var(--border)'}; border-radius: 8px; cursor: pointer; transition: all 0.2s; ${index === this.currentLecture ? 'background: rgba(0,212,170,0.08);' : ''}">
            <div style="width: 28px; height: 28px; background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: var(--teal); flex-shrink: 0;">${index + 1}</div>
            <div style="flex: 1;">
              <div style="font-size: 0.85rem; font-weight: 600; color: var(--white); margin-bottom: 2px;">${lecture.title}</div>
              <div style="font-size: 0.72rem; color: var(--muted);">${lecture.duration || '0:00'}</div>
            </div>
            <div style="font-size: 0.75rem; color: var(--teal); font-weight: 600;">${index === this.currentLecture ? '▶' : '✓'}</div>
          </div>
        `).join('');
      }
      
      renderResourceList() {
        const resourceList = document.getElementById('resourceList');
        const resources = this.options.lectures[this.currentLecture]?.resources || [];
        
        if (resources.length === 0) {
          resourceList.innerHTML = '<div style="color: var(--muted); padding: 20px;">لا توجد موارد متاحة لهذه المحاضرة</div>';
          return;
        }
        
        resourceList.innerHTML = resources.map(resource => `
          <div style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(10,22,40,0.5); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s;">
            <div style="width: 28px; height: 28px; background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem;">📄</div>
            <div style="flex: 1;">
              <div style="font-size: 0.85rem; font-weight: 600; color: var(--white); margin-bottom: 2px;">${resource.title}</div>
              <div style="font-size: 0.72rem; color: var(--muted);">${resource.type || 'PDF'}</div>
            </div>
            <div style="font-size: 0.75rem; color: var(--teal); font-weight: 600;">⬇</div>
          </div>
        `).join('');
      }
      
      attachEvents() {
        document.getElementById('playPauseBtn').addEventListener('click', () => this.togglePlay());
        document.getElementById('prevBtn').addEventListener('click', () => this.previousLecture());
        document.getElementById('nextBtn').addEventListener('click', () => this.nextLecture());
        
        document.getElementById('lectureList').addEventListener('click', (e) => {
          const lectureItem = e.target.closest('.lecture-item');
          if (lectureItem) {
            const index = parseInt(lectureItem.dataset.index);
            this.selectLecture(index);
          }
        });
        
        document.querySelectorAll('.video-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            const tabName = tab.dataset.tab;
            this.switchTab(tabName);
          });
        });
      }
      
      togglePlay() {
        this.isPlaying = !this.isPlaying;
        document.getElementById('playPauseBtn').textContent = this.isPlaying ? '⏸' : '▶';
      }
      
      selectLecture(index) {
        if (index < 0 || index >= this.options.lectures.length) return;
        this.currentLecture = index;
        this.renderLectureList();
        this.renderResourceList();
        
        // Update video player with new lecture
        const lecture = this.options.lectures[index];
        const youtubeId = lecture.youtubeId || '';
        const videoSource = lecture.videoUrl || '';
        
        const videoContainer = document.querySelector('#videoPlayerContainer > div > div:nth-child(2)');
        if (videoContainer) {
          if (youtubeId) {
            videoContainer.innerHTML = `
              <iframe 
                id="mainVideo" 
                style="width: 100%; height: 100%; border: none;"
                src="https://www.youtube.com/embed/${youtubeId}?rel=0&modestbranding=1&autoplay=1"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
              </iframe>
            `;
          } else if (videoSource) {
            videoContainer.innerHTML = `
              <video id="mainVideo" style="width: 100%; height: 100%; object-fit: cover;" controls autoplay>
                <source src="${videoSource}" type="video/mp4">
                متصفحك لا يدعم تشغيل الفيديو
              </video>
            `;
          }
        }
        
        // Update title
        const titleElement = document.querySelector('#videoPlayerContainer > div > div:nth-child(1) > div:nth-child(1)');
        if (titleElement) {
          titleElement.textContent = lecture.title || 'Video Player';
        }
        
        if (this.options.onLectureChange) {
          this.options.onLectureChange(index, this.options.lectures[index]);
        }
      }
      
      previousLecture() {
        this.selectLecture(this.currentLecture - 1);
      }
      
      nextLecture() {
        this.selectLecture(this.currentLecture + 1);
      }
      
      switchTab(tabName) {
        document.querySelectorAll('.video-tab').forEach(tab => {
          tab.classList.remove('active');
          tab.style.color = 'var(--muted)';
          tab.style.borderBottomColor = 'transparent';
          if (tab.dataset.tab === tabName) {
            tab.classList.add('active');
            tab.style.color = 'var(--teal)';
            tab.style.borderBottomColor = 'var(--teal)';
          }
        });
        
        document.querySelectorAll('.video-tab-content').forEach(content => {
          content.style.display = 'none';
        });
        
        document.getElementById(`tab-${tabName}`).style.display = 'block';
      }
    }

    // Quiz System Component (Embedded)
    class QuizSystem {
      constructor(containerId, quizData) {
        this.container = document.getElementById(containerId);
        this.quizData = quizData;
        this.currentQuestion = 0;
        this.score = 0;
        this.userAnswers = [];
        
        this.init();
      }
      
      init() {
        this.render();
      }
      
      render() {
        this.container.innerHTML = `
          <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px;">
            <h3 style="font-size: 1.3rem; font-weight: 700; color: var(--white); margin-bottom: 1rem;">${this.quizData.title}</h3>
            <div id="quizContent"></div>
            <div id="quizResult" style="display: none;"></div>
          </div>
        `;
        
        this.renderQuestion();
      }
      
      renderQuestion() {
        const question = this.quizData.questions[this.currentQuestion];
        const content = document.getElementById('quizContent');
        
        content.innerHTML = `
          <div style="margin-bottom: 1.5rem;">
            <div style="font-size: 0.85rem; color: var(--teal); font-weight: 600; margin-bottom: 0.5rem;">السؤال ${this.currentQuestion + 1} من ${this.quizData.questions.length}</div>
            <div style="font-size: 1rem; color: var(--white); font-weight: 600; line-height: 1.6;">${question.question}</div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 0.75rem;">
            ${question.options.map((option, index) => `
              <button class="quiz-option" data-index="${index}" style="padding: 16px; background: rgba(10,22,40,0.5); border: 2px solid var(--border); border-radius: 8px; color: var(--light); text-align: right; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;">
                ${option}
              </button>
            `).join('')}
          </div>
          <button id="nextQuestionBtn" style="margin-top: 1.5rem; background: var(--teal); color: var(--navy); padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: none;">التالي</button>
        `;
        
        this.attachQuizEvents();
      }
      
      attachQuizEvents() {
        document.querySelectorAll('.quiz-option').forEach(option => {
          option.addEventListener('click', () => {
            const selectedIndex = parseInt(option.dataset.index);
            this.selectAnswer(selectedIndex);
          });
        });
      }
      
      selectAnswer(index) {
        const question = this.quizData.questions[this.currentQuestion];
        const options = document.querySelectorAll('.quiz-option');
        
        options.forEach((opt, i) => {
          opt.style.borderColor = i === index ? 'var(--teal)' : 'var(--border)';
          opt.style.background = i === index ? 'rgba(0,212,170,0.1)' : 'rgba(10,22,40,0.5)';
        });
        
        this.userAnswers[this.currentQuestion] = index;
        document.getElementById('nextQuestionBtn').style.display = 'block';
        
        document.getElementById('nextQuestionBtn').addEventListener('click', () => {
          this.nextQuestion();
        });
      }
      
      nextQuestion() {
        if (this.currentQuestion < this.quizData.questions.length - 1) {
          this.currentQuestion++;
          this.renderQuestion();
        } else {
          this.showResults();
        }
      }
      
      showResults() {
        this.score = this.userAnswers.filter((answer, index) => 
          answer === this.quizData.questions[index].correctAnswer
        ).length;
        
        const resultDiv = document.getElementById('quizResult');
        const contentDiv = document.getElementById('quizContent');
        
        contentDiv.style.display = 'none';
        resultDiv.style.display = 'block';
        
        resultDiv.innerHTML = `
          <div style="text-align: center; padding: 2rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">${this.score === this.quizData.questions.length ? '🎉' : '📊'}</div>
            <div style="font-size: 1.5rem; font-weight: 700; color: var(--white); margin-bottom: 0.5rem;">نتيجتك: ${this.score} / ${this.quizData.questions.length}</div>
            <div style="font-size: 1rem; color: var(--muted); margin-bottom: 2rem;">${Math.round((this.score / this.quizData.questions.length) * 100)}%</div>
            <button onclick="location.reload()" style="background: var(--teal); color: var(--navy); padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer;">إعادة الاختبار</button>
          </div>
        `;
      }
    }
