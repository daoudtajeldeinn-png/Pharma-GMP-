*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {

  --navy2:   #0F2040;
  --navy3:   #1E3A5F;
  --teal:    #00D4AA;
  --teal2:   #00B892;
  --gold:    #C9A84C;
  --gold2:   #E8C96A;
  --light:   #F0F4FF;
  --muted:   #8BA3C4;
  --white:   #FFFFFF;
  --card-bg: #0D1F38;
  --border:  rgba(0,212,170,0.15);
}

html { 
  scroll-behavior: smooth; 
  scroll-padding-top: 80px;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--navy);
  color: var(--light);
  overflow-x: hidden;
  direction: rtl;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,170,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
  will-change: transform;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
  height: 68px;
  background: rgba(10,22,40,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 36px; height: 36px;
  position: relative;
}

.logo-icon::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 12px; height: 14px;
  background: var(--teal);
  border-radius: 2px 2px 0 0;
}
.logo-icon::after {
  content: '';
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 22px solid var(--teal);
  opacity: 0.85;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}
.logo-text span:first-child {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--white);
  letter-spacing: -0.02em;
}
.logo-text span:last-child {
  font-size: 0.65rem;
  color: var(--teal);
  letter-spacing: 0.08em;
  font-weight: 600;
}

nav ul {

  gap: 2rem;
  list-style: none;
}
nav ul a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 600;
  transition: color 0.2s;
}
nav ul a:hover { color: var(--teal); }

.nav-cta {

  padding: 8px 20px;
  border-radius: 6px;
  font-weight: 700 !important;
  font-size: 0.85rem !important;

.nav-cta:hover { background: var(--teal2) !important; color: var(--navy) !important; }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 100px 20px 60px;
  position: relative;
  z-index: 1;
}

.page-header {

.page-title {

.page-subtitle {

.case-studies-grid {

  gap: 2rem;
  margin-bottom: 3rem;

.case-study-card {

  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  transition: all 0.3s;

.case-study-card:hover {

.case-study-header {

  align-items: center;
  gap: 12px;
  margin-bottom: 1.5rem;
}

.case-study-icon {
  width: 50px;
  height: 50px;
  background: rgba(0,212,170,0.1);
  border-radius: 12px;

  align-items: center;
  justify-content: center;

.case-study-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--white);

.case-study-category {

.case-study-description {

.case-study-difficulty {

  border-radius: 12px;
  font-weight: 600;

  padding: 4px 12px;
  background: rgba(0,212,170,0.1);
  color: var(--teal);
  border-radius: 12px;
  font-weight: 600;
}

.modal-overlay {

  left: 0;

.modal-content {

.modal-close {

.modal-close:hover {

.modal-body {

.case-study-section {

.section-content {

.interactive-scenario {

.scenario-question {

.scenario-options {

.scenario-option {

  border: 1px solid var(--border);

  padding: 12px 16px;
  cursor: pointer;
  transition: all 0.2s;

.scenario-option:hover {

.scenario-option.selected {

.scenario-option.correct {

.scenario-option.incorrect {

.scenario-feedback {

.scenario-feedback.show {

.scenario-feedback.correct {

  border: 1px solid #4CAF50;

.scenario-feedback.incorrect {
  background: rgba(244,67,54,0.1);

.progress-bar {
  width: 100%;
  height: 6px;
  background: rgba(0,212,170,0.1);
  border-radius: 3px;
  margin-bottom: 1.5rem;
  overflow: hidden;

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--teal2));

  transition: width 0.3s ease;

@media (max-width: 768px) {
  .page-title {

  }

  }
  
  nav ul {
    display: none;
  }
}
  </style>
</head>

              "موافقتان",
              "ثلاث موافقات",
              "أربع موافقات"
            ],
            correct: 2,
            explanation: "عادة تتطلب ثلاث موافقات: الجودة، الإنتاج، والبحث والتطوير."
          },
          {
            question: "متى يعتبر التغيير مكتمل؟",
            options: [
              "بعد الموافقة",
              "بعد التنفيذ",
              "بعد التحقق من الفعالية",
              "بعد التوثيق"
            ],
            correct: 2,
            explanation: "التغيير يعتبر مكتملاً فقط بعد التحقق من فعاليته."
          }
        ]
      }
    ];

    // Render case studies
    function renderCaseStudies() {
      const grid = document.getElementById('caseStudiesGrid');
      grid.innerHTML = caseStudies.map(study => `
        <div class="case-study-card" onclick="openCaseStudy(${study.id})">
          <div class="case-study-header">
            <div class="case-study-icon">${study.icon}</div>
            <div>
              <div class="case-study-title">${study.title}</div>
              <div class="case-study-category">${study.category}</div>
            </div>
          </div>
          <p class="case-study-description">${study.description}</p>
          <div class="case-study-meta">
            <span class="case-study-difficulty">${study.difficulty}</span>
            <span class="case-study-duration">${study.duration}</span>
          </div>
        </div>
      `).join('');
    }

    // Open case study modal
    function openCaseStudy(id) {
      const study = caseStudies.find(s => s.id === id);
      if (!study) return;

      document.getElementById('modalTitle').textContent = study.title;
      
      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        
        <div class="case-study-section">
          <h3 class="section-title">وصف الحالة</h3>
          <p class="section-content">${study.description}</p>
        </div>
        
        <div class="case-study-section">
          <h3 class="section-title">السيناريو التفاعلي</h3>
          <div id="scenarioContainer"></div>
        </div>
      `;

      renderScenario(study.scenario, 0);
      
      document.getElementById('modalOverlay').classList.add('active');
    }

    // Render scenario questions
    function renderScenario(scenario, currentIndex) {
      const container = document.getElementById('scenarioContainer');
      const question = scenario[currentIndex];
      
      container.innerHTML = `
        <div class="interactive-scenario">
          <div class="scenario-question">السؤال ${currentIndex + 1}/${scenario.length}: ${question.question}</div>
          <div class="scenario-options">
            ${question.options.map((option, index) => `
              <div class="scenario-option" onclick="selectOption(${index}, ${question.correct}, '${question.explanation.replace(/'/g, "\\'")}', ${currentIndex}, ${scenario.length})">
                ${option}
              </div>
            `).join('')}
          </div>
          <div class="scenario-feedback" id="feedback"></div>
        </div>
      `;

      // Update progress
      const progress = ((currentIndex) / scenario.length) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
    }

    // Handle option selection
    function selectOption(selectedIndex, correctIndex, explanation, currentIndex, totalQuestions) {
      const options = document.querySelectorAll('.scenario-option');
      options.forEach(opt => opt.classList.remove('selected'));
      options[selectedIndex].classList.add('selected');

      const isCorrect = selectedIndex === correctIndex;
      options[selectedIndex].classList.add(isCorrect ? 'correct' : 'incorrect');
      if (!isCorrect) {
        options[correctIndex].classList.add('correct');
      }

      const feedback = document.getElementById('feedback');
      feedback.className = `scenario-feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
      feedback.innerHTML = `
        <strong>${isCorrect ? '✓ إجابة صحيحة!' : '✗ إجابة خاطئة'}</strong>
        <p style="margin-top: 0.5rem;">${explanation}</p>
      `;

      // Disable all options
      options.forEach(opt => opt.style.pointerEvents = 'none');

      // Next question after delay
      setTimeout(() => {
        if (currentIndex < totalQuestions - 1) {
          renderScenario(caseStudies.find(s => s.id === getCurrentStudyId()).scenario, currentIndex + 1);
        } else {
          showCompletion();
        }
      }, 3000);
    }

    function getCurrentStudyId() {
      const title = document.getElementById('modalTitle').textContent;
      return caseStudies.find(s => s.title === title)?.id;
    }

    function showCompletion() {
      const container = document.getElementById('scenarioContainer');
      container.innerHTML = `
        <div class="interactive-scenario" style="text-align: center;">
          <div style="font-size: 3rem; margin-bottom: 1rem;">🎉</div>
          <h3 style="color: var(--teal); margin-bottom: 1rem;">تم إكمال دراسة الحالة!</h3>
          <p style="color: var(--muted); margin-bottom: 1.5rem;">لقد أتممت جميع الأسئل في هذه الدراسة.</p>
          <button onclick="closeModal()" style="background: var(--teal); color: var(--navy); border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer;">
            إغلاق
          </button>
        </div>
      `;
      document.getElementById('progressFill').style.width = '100%';
    }

    // Close modal
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    // Event listeners
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) {
        closeModal();
      }
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderCaseStudies();
    });
  </script>
</body>
</html>
