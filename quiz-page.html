<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام الاختبارات | PharmaPro Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #0A1628;
  --navy2:   #0F2040;
  --navy3:   #1E3A5F;
  --teal:    #00D4AA;
  --teal2:   #00B892;
  --gold:    #C9A84C;
  --gold2:   #E8C96A;
  --light:   #F0F4FF;
  --muted:   #8BA3C4;
  --white:   #FFFFFF;
  --card-bg: #0D1F38;
  --border:  rgba(0,212,170,0.15);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--navy);
  color: var(--light);
  overflow-x: hidden;
  direction: rtl;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,170,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
  height: 68px;
  background: rgba(10,22,40,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 36px; height: 36px;
  position: relative;
}

.logo-icon::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 12px; height: 14px;
  background: var(--teal);
  border-radius: 2px 2px 0 0;
}
.logo-icon::after {
  content: '';
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 22px solid var(--teal);
  opacity: 0.85;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}
.logo-text span:first-child {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--white);
  letter-spacing: -0.02em;
}
.logo-text span:last-child {
  font-size: 0.65rem;
  color: var(--teal);
  letter-spacing: 0.08em;
  font-weight: 600;
}

nav ul {
  display: flex;
  gap: 2rem;
  list-style: none;
}
nav ul a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 600;
  transition: color 0.2s;
}
nav ul a:hover { color: var(--teal); }

.nav-cta {
  background: var(--teal);
  color: var(--navy) !important;
  padding: 8px 20px;
  border-radius: 6px;
  font-weight: 700 !important;
  font-size: 0.85rem !important;
  transition: background 0.2s !important;
}
.nav-cta:hover { background: var(--teal2) !important; color: var(--navy) !important; }

section {
  position: relative;
  z-index: 1;
  padding: 90px 5%;
}

.section-eyebrow {
  font-size: 0.72rem;
  color: var(--teal);
  letter-spacing: 0.15em;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(1.8rem, 3vw, 2.6rem);
  font-weight: 900;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 1rem;
}
.section-title em { font-style: normal; color: var(--teal); }

.section-sub {
  font-size: 1rem;
  color: var(--muted);
  line-height: 1.8;
  max-width: 560px;
}

@media (max-width: 968px) {
  nav ul { display: none; }
}
  </style>
</head>
<body>
  <nav>
    <a href="pharma-landing.html" class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text">
        <span>PharmaPro Academy</span>
        <span>GMP · ISO · QC TRAINING</span>
      </div>
    </a>
    <ul>
      <li><a href="pharma-landing.html#courses">الكورسات</a></li>
      <li><a href="pharma-landing.html#enroll" class="nav-cta">سجّل الآن</a></li>
    </ul>
  </nav>

  <section style="padding: 100px 5% 40px;">
    <div style="max-width: 900px; margin: 0 auto;">
      <div class="fade-up" style="text-align: center; margin-bottom: 3rem;">
        <div class="section-eyebrow">نظام الاختبارات التفاعلي</div>
        <h1 class="section-title">اختبر <em>معرفتك</em></h1>
        <p class="section-sub">اختر كورس للاختبار وتقييم فهمك للمحتوى</p>
      </div>

      <!-- Course Selection -->
      <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 2rem;">
        <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--white); margin-bottom: 1.5rem;">اختر الكورس</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
          <button class="course-quiz-btn" data-course="capa" style="padding: 16px; background: rgba(10,22,40,0.5); border: 2px solid var(--border); border-radius: 10px; color: var(--light); font-weight: 600; cursor: pointer; transition: all 0.2s;">
            ⚠️ CAPA
          </button>
          <button class="course-quiz-btn" data-course="gmp-basics" style="padding: 16px; background: rgba(10,22,40,0.5); border: 2px solid var(--border); border-radius: 10px; color: var(--light); font-weight: 600; cursor: pointer; transition: all 0.2s;">
            🏭 GMP Basics
          </button>
          <button class="course-quiz-btn" data-course="iso-9001" style="padding: 16px; background: rgba(10,22,40,0.5); border: 2px solid var(--border); border-radius: 10px; color: var(--light); font-weight: 600; cursor: pointer; transition: all 0.2s;">
            📋 ISO 9001
          </button>
          <button class="course-quiz-btn" data-course="validation" style="padding: 16px; background: rgba(10,22,40,0.5); border: 2px solid var(--border); border-radius: 10px; color: var(--light); font-weight: 600; cursor: pointer; transition: all 0.2s;">
            🔬 Validation
          </button>
          <button class="course-quiz-btn" data-course="qc-lab" style="padding: 16px; background: rgba(10,22,40,0.5); border: 2px solid var(--border); border-radius: 10px; color: var(--light); font-weight: 600; cursor: pointer; transition: all 0.2s;">
            🧫 QC Lab
          </button>
          <button class="course-quiz-btn" data-course="ipqc" style="padding: 16px; background: rgba(10,22,40,0.5); border: 2px solid var(--border); border-radius: 10px; color: var(--light); font-weight: 600; cursor: pointer; transition: all 0.2s;">
            💊 IPQC
          </button>
        </div>
      </div>

      <!-- Quiz Container -->
      <div id="quizContainer"></div>

      <!-- Results History -->
      <div id="resultsHistory" style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-top: 2rem; display: none;">
        <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--white); margin-bottom: 1.5rem;">سجل النتائج</h3>
        <div id="historyList" style="display: flex; flex-direction: column; gap: 1rem;"></div>
      </div>
    </div>
  </section>

  <script>
    // Course selection
    document.querySelectorAll('.course-quiz-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const course = btn.dataset.course;
        loadQuiz(course);
        
        // Update active state
        document.querySelectorAll('.course-quiz-btn').forEach(b => {
          b.style.borderColor = 'var(--border)';
          b.style.background = 'rgba(10,22,40,0.5)';
        });
        btn.style.borderColor = 'var(--teal)';
        btn.style.background = 'rgba(0,212,170,0.1)';
      });
    });

    // Load quiz for selected course
    async function loadQuiz(courseName) {
      const container = document.getElementById('quizContainer');
      const quizFilePath = `quizzes/${courseName}-quiz.md`;
      
      const loader = new QuizLoader('quizContainer', quizFilePath);
    }

    // Load results from localStorage
    function loadResultsHistory() {
      const history = JSON.parse(localStorage.getItem('quizResults') || '[]');
      const historyContainer = document.getElementById('resultsHistory');
      const historyList = document.getElementById('historyList');
      
      if (history.length > 0) {
        historyContainer.style.display = 'block';
        historyList.innerHTML = history.map(result => `
          <div style="display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(10,22,40,0.5); border: 1px solid var(--border); border-radius: 8px;">
            <div>
              <div style="font-size: 0.9rem; font-weight: 600; color: var(--white);">${result.course}</div>
              <div style="font-size: 0.75rem; color: var(--muted);">${result.date}</div>
            </div>
            <div style="text-align: left;">
              <div style="font-size: 1.2rem; font-weight: 700; color: var(--teal);">${result.score}/${result.total}</div>
              <div style="font-size: 0.75rem; color: var(--muted);">${Math.round((result.score / result.total) * 100)}%</div>
            </div>
          </div>
        `).join('');
      }
    }

    // Save quiz result
    function saveQuizResult(courseName, score, total) {
      const history = JSON.parse(localStorage.getItem('quizResults') || '[]');
      history.unshift({
        course: courseName,
        score: score,
        total: total,
        date: new Date().toLocaleDateString('ar-EG')
      });
      
      // Keep only last 10 results
      if (history.length > 10) {
        history.pop();
      }
      
      localStorage.setItem('quizResults', JSON.stringify(history));
      loadResultsHistory();
    }

    // Initialize
    loadResultsHistory();

    // Add CSS for hover effects
    const style = document.createElement('style');
    style.textContent = `
      .course-quiz-btn:hover {
        border-color: var(--teal);
        background: rgba(0,212,170,0.05);
        transform: translateY(-2px);
      }
    `;
    document.head.appendChild(style);
  </script>

  <footer style="background: rgba(10,22,40,0.8); padding: 30px 5%; text-align: center; border-top: 1px solid var(--border); margin-top: 60px;">
    <p style="color: var(--muted); font-size: 0.85rem; margin-bottom: 8px;">© 2025 PharmaPro Academy · جميع الحقوق محفوظة</p>
    <p style="color: var(--muted); font-size: 0.85rem;">تطوير وإدارة: د.داود تاج الدين احمد عبدالكريم Dr.Daoud Tajeldeinn Ahmed</p>
  </footer>
</body>
</html>
