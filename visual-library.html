html {

body {

body::before {

  position: fixed;
  inset: 0;
  background-image:

.logo {

  gap: 10px;
  text-decoration: none;
}

.logo-icon {

}

.logo-icon::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 12px; height: 14px;
  background: var(--teal);
  border-radius: 2px 2px 0 0;
}
.logo-icon::after {
  content: '';
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 22px solid var(--teal);

.logo-text span:first-child {

  font-weight: 700;
  font-size: 1.05rem;
  color: var(--white);

.logo-text span:last-child {

        ? visualItems 
        : visualItems.filter(item => item.category === filter);
      
      grid.innerHTML = filteredItems.map(item => `
        <div class="visual-card" onclick="openVisual(${item.id})">
          <div class="visual-preview">${item.icon}</div>
          <div class="visual-content">
            <div class="visual-category">${item.category.toUpperCase()}</div>
            <h3 class="visual-title">${item.title}</h3>
            <p class="visual-description">${item.description}</p>
            <div class="visual-meta">
              ${item.tags.map(tag => `<span class="visual-tag">${tag}</span>`).join('')}
            </div>
          </div>
        </div>
      `).join('');
    }

    // Filter visuals
    function filterVisuals(category) {
      // Update active button
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.toLowerCase() === category || (category === 'all' && btn.textContent === 'الكل')) {
          btn.classList.add('active');
        }
      });
      
      renderVisuals(category);
    }

    // Open visual modal
    function openVisual(id) {
      const item = visualItems.find(v => v.id === id);
      if (!item) return;

      document.getElementById('modalTitle').textContent = item.title;
      
      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <div class="infographic-container">
          <div class="infographic-title">${item.title}</div>
          <div class="infographic-content">
            ${item.content.items.map((contentItem, index) => `
              <div class="infographic-item">
                <div class="item-icon">${contentItem.icon}</div>
                <div class="item-title">${contentItem.title}</div>
                <div class="item-description">${contentItem.description}</div>
              </div>
            `).join('')}
          </div>
        </div>
        
        <div class="download-section">
          <div>
            <strong style="color: var(--white);">تحميل هذا الإنفوجرافيك</strong>
            <p style="color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem;">صورة عالية الجودة للاستخدام التعليمي</p>
          </div>
          <button class="download-btn" onclick="downloadInfographic('${item.title}')">📥 تحميل</button>
        </div>
      `;
      
      document.getElementById('modalOverlay').classList.add('active');
    }

    // Download infographic
    function downloadInfographic(title) {
      alert(`سيتم تحميل: ${title}\n\nملاحظة: هذه ميزة تجريبية. في الإصدار الكامل، سيتم تحميل صورة عالية الجودة.`);
    }

    // Close modal
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    // Event listeners
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) {
        closeModal();
      }
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderVisuals();
    });
  </script>
</body>
</html>
